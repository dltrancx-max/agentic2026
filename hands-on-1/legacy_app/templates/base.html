<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}LegacyForms{% endblock %}</title>
  <style>
    body { font-family: "Segoe UI", Tahoma, sans-serif; margin: 0; background: #d4d0c8; color: #111; }
    header { background: #003a6b; color: #fff; padding: 10px 16px; border-bottom: 2px solid #001a33; }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header .sub { font-size: 12px; opacity: 0.85; }
    main { max-width: 880px; margin: 24px auto; background: #fff; border: 1px solid #888; padding: 20px 24px; }
    h2 { color: #003a6b; margin-top: 0; font-size: 18px; border-bottom: 1px solid #ccc; padding-bottom: 6px; }
    label { display: block; font-size: 13px; margin: 10px 0 4px; }
    input[type=text], input[type=password], select {
      font: inherit; padding: 4px 6px; border: 1px solid #888; background: #fff; min-width: 200px;
    }
    button, input[type=submit] {
      font: inherit; padding: 4px 14px; background: #ddd; border: 1px solid #555;
      border-top-color: #fff; border-left-color: #fff; cursor: pointer; margin-top: 12px;
    }
    button:hover, input[type=submit]:hover { background: #cfcfcf; }
    table { border-collapse: collapse; margin-top: 14px; font-size: 13px; }
    th, td { border: 1px solid #999; padding: 4px 8px; text-align: left; }
    th { background: #e0dccc; }
    .error { color: #a00; margin: 10px 0; font-size: 13px; }
    .ok { color: #060; margin: 10px 0; font-size: 13px; }
    .legacy-note { font-size: 11px; color: #555; margin-top: 18px; border-top: 1px dotted #aaa; padding-top: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>LegacyForms 8.3</h1>
    <div class="sub">Supply Chain Manifests &mdash; Production</div>
  </header>
  <main>{% block body %}{% endblock %}</main>
</body>
</html>
